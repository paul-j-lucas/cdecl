[cdecl_parser.h]
keep-includes = "c_type.h"
proxy = "parser.h"

[config.h]
ignore-as-argument = true

[lexer.c]
keep-includes = [
    "errno.h",
    "inttypes.h",
    "stdio.h",
    "stdlib.h",
    "string.h"
]

[parser.h]
ignore-as-argument = true
keep = true

[pjl_config.h]
first = true
keep = true
proxy = [
    "attribute.h",
    "config.h",
]

